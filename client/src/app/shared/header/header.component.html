<nav class="floating-nav-dock" [class.scrolled]="isScrolled">
  <div class="nav-container">
    
    <!-- Logo / Brand -->
    <div class="nav-logo" (click)="scrollToSection('hero')">
      <div class="logo-badge">K</div>
      <span class="logo-text">Kaushal<span class="logo-accent">.</span></span>
    </div>

    <!-- Nav Items (Desktop) -->
    <div class="nav-links">
      <button (click)="scrollToSection('experience')" class="nav-btn">
        <span class="btn-dot"></span> Experience
      </button>
      <button (click)="scrollToSection('projects')" class="nav-btn">
        <span class="btn-dot"></span> Projects
      </button>
      <div class="nav-separator"></div>

      </button>
      <button (click)="downloadResume()" class="nav-cta">

      </button>

      <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div class="mobile-menu" [class.menu-open]="isMenuOpen">
    <button (click)="scrollToSection('experience')" class="mobile-nav-btn">Experience</button>
    <button (click)="scrollToSection('projects')" class="mobile-nav-btn">Projects</button>
